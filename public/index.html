<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaizen — Обзор системы</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body id="page-dashboard">
  <nav class="nav-bar">
    <div class="nav-inner">
      <a href="/" class="nav-logo"><span>改</span> Kaizen</a>
      <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/products.html">Продукты</a>
        <a href="/processes.html">Процессы</a>
        <a href="/scenarios.html">Сценарии</a>
        <a href="/models.html">Модели ИИ</a>
      </div>
    </div>
  </nav>

  <div class="container">

    <!-- Alert bar -->
    <div id="dashAlerts"></div>

    <!-- Section 1: Summary (5 widgets) -->
    <div id="dashSummary" class="dashboard-summary">
      <div class="skeleton skeleton-widget"></div>
      <div class="skeleton skeleton-widget"></div>
      <div class="skeleton skeleton-widget"></div>
      <div class="skeleton skeleton-widget"></div>
      <div class="skeleton skeleton-widget"></div>
    </div>

    <!-- Section 2: Products overview + Activity feed side by side -->
    <div class="dash-main-row">
      <div id="dashProductsOverview" class="dash-main-left"><div class="skeleton skeleton-card"></div></div>
      <div id="dashActivity" class="dash-main-right"><div class="skeleton skeleton-card"></div></div>
    </div>

    <!-- Public Roadmap shortcut -->
    <a href="/public-roadmap.html" target="_blank" style="display:flex;align-items:center;gap:14px;background:#1a1d2e;border:1px solid #2d3748;border-radius:10px;padding:16px 22px;text-decoration:none;color:inherit;margin-top:16px;transition:border-color 0.15s" onmouseover="this.style.borderColor='#60a5fa'" onmouseout="this.style.borderColor='#2d3748'">
      <span style="font-size:1.6rem">🗺️</span>
      <div>
        <div style="font-weight:600;font-size:0.95rem">Дорожная карта разработки</div>
        <div style="font-size:0.8rem;color:#94a3b8;margin-top:2px">Публичная страница — статус релизов по всем продуктам. Можно отправить маркетингу.</div>
      </div>
      <span style="margin-left:auto;font-size:0.8rem;color:#60a5fa">Открыть →</span>
    </a>

  </div>

  <script type="module" src="/js/dashboard.js"></script>
  <script src="/js/common.js"></script>
</body>
</html>

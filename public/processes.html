<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaizen — Процессы</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav-bar">
    <div class="nav-inner">
      <a href="/" class="nav-logo"><span>改</span> Kaizen</a>
      <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/products.html">Продукты</a>
        <a href="/processes.html">Процессы</a>
        <a href="/scenarios.html">Сценарии</a>
        <a href="/models.html">Модели ИИ</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <header>
      <h1>Процессы</h1>
    </header>

    <!-- Summary Bar -->
    <div id="processSummary" class="proc-summary">
      <div class="skeleton skeleton-widget"></div>
      <div class="skeleton skeleton-widget"></div>
      <div class="skeleton skeleton-widget"></div>
      <div class="skeleton skeleton-widget"></div>
    </div>

    <!-- Active Processes -->
    <section class="proc-section" id="sectionActive" style="display:none">
      <div class="proc-section-header" onclick="toggleSection('sectionActive')">
        <span class="collapsible-arrow">&#9654;</span>
        <h2>Активные <span class="proc-section-count" id="countActive">0</span></h2>
      </div>
      <div class="proc-section-body">
        <div class="proc-cards" id="cardsActive"></div>
      </div>
    </section>

    <!-- Queue -->
    <section class="proc-section" id="sectionQueue" style="display:none">
      <div class="proc-section-header" onclick="toggleSection('sectionQueue')">
        <span class="collapsible-arrow">&#9654;</span>
        <h2>В очереди <span class="proc-section-count" id="countQueue">0</span></h2>
      </div>
      <div class="proc-section-body">
        <div class="proc-cards" id="cardsQueue"></div>
      </div>
    </section>

    <!-- Attention (failed) -->
    <section class="proc-section proc-section-attention" id="sectionAttention" style="display:none">
      <div class="proc-section-header" onclick="toggleSection('sectionAttention')">
        <span class="collapsible-arrow">&#9654;</span>
        <h2>Требуют внимания <span class="proc-section-count" id="countAttention">0</span></h2>
      </div>
      <div class="proc-section-body">
        <div class="proc-cards" id="cardsAttention"></div>
      </div>
    </section>

    <!-- History -->
    <section class="proc-section" id="sectionHistory">
      <div class="proc-section-header" onclick="toggleSection('sectionHistory')">
        <span class="collapsible-arrow">&#9654;</span>
        <h2>История <span class="proc-section-count" id="countHistory">0</span></h2>
      </div>
      <div class="proc-section-body">
        <div class="proc-history-filters">
          <input type="text" id="filterSearch" placeholder="Поиск по продукту...">
          <select id="filterType"><option value="">Все типы</option></select>
          <select id="filterProduct"><option value="">Все продукты</option></select>
          <select id="filterPeriod">
            <option value="7d">7 дней</option>
            <option value="30d">30 дней</option>
            <option value="all">Все</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:24px"></th>
                <th>Продукт</th>
                <th>Тип</th>
                <th>Релиз</th>
                <th>Модель</th>
                <th>Длительность</th>
                <th>Дата</th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
        <div class="proc-pagination" id="historyPagination"></div>
      </div>
    </section>

    <div id="processesEmpty" class="empty" style="display:none">
      <p>Нет процессов</p>
    </div>
  </div>

  <!-- Process Detail Modal -->
  <div class="modal-overlay" id="processDetailModal">
    <div class="modal" style="max-width:800px">
      <div class="proc-detail-header">
        <div>
          <h2 id="processDetailTitle">Процесс</h2>
          <div class="proc-detail-title-meta" id="processDetailMeta"></div>
        </div>
        <button class="proc-detail-close" onclick="closeModal('processDetailModal')">✕</button>
      </div>
      <div id="processDetailContent"></div>
    </div>
  </div>

  <script type="module" src="/js/processes.js"></script>
  <script src="/js/common.js"></script>
</body>
</html>

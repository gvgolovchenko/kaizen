<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaizen — Процессы</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav-bar">
    <div class="nav-inner">
      <a href="/" class="nav-logo"><span>改</span> Kaizen</a>
      <div class="nav-links">
        <a href="/">Продукты</a>
        <a href="/processes.html" class="active">Процессы</a>
        <a href="/models.html">Модели ИИ</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <header>
      <h1>Процессы</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="filterStatus" style="padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem">
          <option value="">Все статусы</option>
          <option value="pending">Pending</option>
          <option value="running">Running</option>
          <option value="completed">Completed</option>
          <option value="failed">Failed</option>
        </select>
      </div>
    </header>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Продукт</th>
            <th>Тип</th>
            <th>Модель</th>
            <th>Статус</th>
            <th>Создан</th>
            <th>Длительность</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="processesBody"></tbody>
      </table>
    </div>

    <div id="processesEmpty" class="empty" style="display:none">
      <p>Нет процессов</p>
    </div>
  </div>

  <!-- Process Detail Modal -->
  <div class="modal-overlay" id="processDetailModal">
    <div class="modal" style="max-width:680px">
      <h2 id="processDetailTitle">Процесс</h2>
      <div id="processDetailContent"></div>
    </div>
  </div>

  <script type="module" src="/js/processes.js"></script>
</body>
</html>

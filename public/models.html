<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaizen — Модели ИИ</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav-bar">
    <div class="nav-inner">
      <a href="/" class="nav-logo"><span>改</span> Kaizen</a>
      <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/products.html">Продукты</a>
        <a href="/processes.html">Процессы</a>
        <a href="/scenarios.html">Сценарии</a>
        <a href="/models.html">Модели ИИ</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <header>
      <h1>Модели ИИ</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="filterDeployment" style="padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem">
          <option value="">Все типы</option>
          <option value="local">Локальные</option>
          <option value="cloud">Облачные</option>
        </select>
        <button class="btn btn-primary" onclick="showModelModal()">+ Модель</button>
      </div>
    </header>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Название</th>
            <th>Провайдер</th>
            <th>Model ID</th>
            <th>Тип</th>
            <th>Параметры</th>
            <th>Контекст</th>
            <th>Статус</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="modelsBody"></tbody>
      </table>
    </div>

    <div id="modelsEmpty" class="empty" style="display:none">
      <p>Нет моделей</p>
    </div>
  </div>

  <!-- Create/Edit Model Modal -->
  <div class="modal-overlay" id="modelModal">
    <div class="modal" style="max-width:580px">
      <h2 id="modelModalTitle">Новая модель</h2>
      <form id="modelForm" onsubmit="return handleModelSubmit(event)">
        <input type="hidden" id="modelEditId">

        <!-- Провайдер — первым, т.к. от него зависят остальные поля -->
        <div class="form-group">
          <label>Провайдер *</label>
          <select id="modelProvider" onchange="onProviderChange()">
            <optgroup label="Локальные (CLI-агенты)">
              <option value="claude-code">Claude Code</option>
              <option value="qwen-code">Qwen Code</option>
              <option value="kilo-code">Kilo Code</option>
            </optgroup>
            <optgroup label="Локальные (inference)">
              <option value="ollama">Ollama</option>
              <option value="mlx">MLX</option>
            </optgroup>
            <optgroup label="Облачные API">
              <option value="anthropic">Anthropic</option>
              <option value="openai">OpenAI</option>
              <option value="google">Google</option>
            </optgroup>
          </select>
        </div>

        <!-- Discover для ollama/mlx -->
        <div class="discover-section" id="discoverSection" style="display:none">
          <div class="discover-row">
            <button type="button" class="discover-btn" id="discoverBtn" onclick="window._discoverModels()">Обнаружить установленные</button>
            <select class="discover-select" id="discoverSelect" disabled onchange="window._onDiscoverSelect(this.value)">
              <option value="">— Выберите модель —</option>
            </select>
          </div>
        </div>

        <!-- Название + Model ID в строку -->
        <div style="display:flex;gap:12px">
          <div class="form-group" style="flex:1;margin-bottom:0">
            <label>Название *</label>
            <input type="text" id="modelName" required placeholder="">
          </div>
          <div class="form-group" style="flex:1;margin-bottom:0">
            <label>Model ID *</label>
            <input type="text" id="modelModelId" required placeholder="">
            <div id="modelIdHint" style="font-size:0.75rem;color:var(--text-dim);margin-top:2px"></div>
          </div>
        </div>

        <!-- API Key — только для cloud -->
        <div class="form-group" id="apiKeyGroup" style="display:none;margin-top:10px">
          <label>API Key *</label>
          <input type="password" id="modelApiKey" placeholder="">
        </div>

        <!-- Deployment скрыт, авто-определяется -->
        <input type="hidden" id="modelDeployment" value="local">

        <!-- Доп. настройки (сворачиваемые) -->
        <div class="collapsible" style="margin-top:12px">
          <div class="collapsible-toggle" onclick="this.parentElement.classList.toggle('open')" style="cursor:pointer">
            <span class="collapsible-arrow">&#9654;</span>
            <span style="font-size:0.85rem;color:var(--text-dim)">Доп. настройки</span>
          </div>
          <div class="collapsible-body" style="padding-top:8px">
            <div class="form-group">
              <label>Описание</label>
              <textarea id="modelDescription" rows="2" placeholder="Описание модели..."></textarea>
            </div>
            <div style="display:flex;gap:12px">
              <div class="form-group" style="flex:1;margin-bottom:0">
                <label>Параметры</label>
                <input type="text" id="modelParamsSize" placeholder="30B, 70B...">
              </div>
              <div class="form-group" style="flex:1;margin-bottom:0">
                <label>Контекст (токены)</label>
                <input type="number" id="modelContextLength" placeholder="131072">
              </div>
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal('modelModal')">Отмена</button>
          <button type="submit" class="btn btn-primary" id="modelSubmitBtn">Создать</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/js/models.js"></script>
</body>
</html>

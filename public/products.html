<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaizen — Продукты</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav-bar">
    <div class="nav-inner">
      <a href="/" class="nav-logo"><span>改</span> Kaizen</a>
      <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/products.html">Продукты</a>
        <a href="/processes.html">Процессы</a>
        <a href="/scenarios.html">Сценарии</a>
        <a href="/models.html">Модели ИИ</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <header>
      <h1>Продукты</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="sortProducts" style="padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem">
          <option value="date">По дате</option>
          <option value="name">По имени</option>
          <option value="issues">По задачам</option>
          <option value="activity">По активности</option>
        </select>
        <button class="btn btn-primary" onclick="showCreateModal()">+ Продукт</button>
      </div>
    </header>

    <div id="productsList" class="cards"></div>
  </div>

  <!-- Create/Edit Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <h2 id="productModalTitle">Новый продукт</h2>
      <form id="productForm" onsubmit="return handleProductSubmit(event)">
        <input type="hidden" id="productId">
        <div class="form-group">
          <label>Название *</label>
          <input type="text" id="productName" required>
        </div>
        <div class="form-group">
          <label>Описание</label>
          <textarea id="productDesc"></textarea>
        </div>
        <div class="form-group">
          <label>Репозиторий (URL)</label>
          <input type="text" id="productRepo">
        </div>
        <div class="form-group">
          <label>Стек технологий</label>
          <input type="text" id="productStack" placeholder="Node.js, React, PostgreSQL...">
        </div>
        <div class="form-group">
          <label>Ответственный</label>
          <input type="text" id="productOwner">
        </div>
        <div class="form-group">
          <label>Путь к проекту</label>
          <input type="text" id="productPath" placeholder="/Users/rivcmakar1/AIWork/Разработка ПО/...">
        </div>
        <div class="form-group">
          <label>ID системы (Rivc.Connect)</label>
          <input type="number" id="productRcSystemId" placeholder="Необязательно">
        </div>
        <div class="form-group">
          <label>ID модуля (Rivc.Connect)</label>
          <input type="number" id="productRcModuleId" placeholder="Необязательно">
        </div>
        <div style="margin:16px 0 8px;font-weight:600;font-size:0.85rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em">Локальная разработка</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group" style="margin:0">
            <label>Порт фронтенда</label>
            <input type="number" id="productDevFrontPort" placeholder="3000">
          </div>
          <div class="form-group" style="margin:0">
            <label>Порт бэкенда</label>
            <input type="number" id="productDevBackPort" placeholder="5000">
          </div>
        </div>
        <div class="form-group">
          <label>Команда запуска</label>
          <input type="text" id="productDevStartCmd" placeholder="cd front && npm run dev">
        </div>
        <div style="margin:16px 0 8px;font-weight:600;font-size:0.85rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em">Прод-сервер</div>
        <div class="form-group">
          <label>URL фронтенда</label>
          <input type="text" id="productProdFrontUrl" placeholder="http://192.168.178.213:7012">
        </div>
        <div class="form-group">
          <label>URL бэкенда</label>
          <input type="text" id="productProdBackUrl" placeholder="http://192.168.178.213:7013">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeProductModal()">Отмена</button>
          <button type="submit" class="btn btn-primary">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/js/products.js"></script>
  <script src="/js/common.js"></script>
</body>
</html>

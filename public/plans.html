<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaizen — Планы</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav-bar">
    <div class="nav-inner">
      <a href="/" class="nav-logo"><span>改</span> Kaizen</a>
      <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/products.html">Продукты</a>
        <a href="/processes.html">Процессы</a>
        <a href="/scenarios.html">Сценарии</a>
        <a href="/models.html">Модели ИИ</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <header>
      <h1>Планы</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="filterStatus" style="padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem">
          <option value="">Все статусы</option>
          <option value="template">Шаблоны</option>
          <option value="draft">Draft</option>
          <option value="scheduled">Scheduled</option>
          <option value="active">Active</option>
          <option value="paused">Paused</option>
          <option value="completed">Completed</option>
          <option value="failed">Failed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
    </header>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Продукт</th>
            <th>Название</th>
            <th>Статус</th>
            <th>Шаги</th>
            <th>Прогресс</th>
            <th>Запланирован</th>
            <th>Создан</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="plansBody"></tbody>
      </table>
    </div>

    <div id="plansEmpty" class="empty" style="display:none">
      <p>Нет планов</p>
    </div>
  </div>

  <script type="module" src="/js/plans.js"></script>
</body>
</html>
